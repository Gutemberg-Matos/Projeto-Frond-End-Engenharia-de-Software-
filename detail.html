<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalhes do imóvel — EstudanteLar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ---- Detail-page only styles ---- */
    .detail-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-2);
      padding: 8px 16px 8px 10px;
      border-radius: var(--r-sm);
      margin-bottom: 24px;
      transition: background .2s, color .2s;
    }
    .detail-back:hover { background: var(--cream-dark); color: var(--text-1); }

    /* Gallery */
    .gallery {
      border-radius: var(--r-xl);
      overflow: hidden;
      background: var(--cream-dark);
      margin-bottom: 40px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: repeat(2, 220px);
      gap: 6px;
      max-height: 446px;
    }
    .gallery-main {
      grid-row: 1 / 3;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .gallery-main img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .5s var(--ease);
    }
    .gallery-main:hover img { transform: scale(1.03); }
    .gallery-thumb {
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    .gallery-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform .4s var(--ease);
    }
    .gallery-thumb:hover img { transform: scale(1.05); }
    .gallery-more {
      position: relative;
    }
    .gallery-more::after {
      content: attr(data-more);
      position: absolute;
      inset: 0;
      background: rgba(26,23,20,.6);
      backdrop-filter: blur(2px);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 18px;
      font-weight: 700;
    }
    .gallery-more img { width: 100%; height: 100%; object-fit: cover; }

    /* Lightbox */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(10,8,6,.92);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox-img-wrap {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
    }
    .lightbox-img-wrap img {
      max-width: 100%;
      max-height: 85vh;
      border-radius: var(--r-md);
      object-fit: contain;
    }
    .lb-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      border: none;
      color: var(--white);
      font-size: 18px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background .2s;
      backdrop-filter: blur(8px);
    }
    .lb-btn:hover { background: rgba(255,255,255,.3); }
    .lb-prev { left: -56px; }
    .lb-next { right: -56px; }
    .lb-close {
      position: absolute;
      top: -48px; right: 0;
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      border: none;
      color: var(--white);
      font-size: 16px;
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: background .2s;
    }
    .lb-close:hover { background: rgba(255,255,255,.25); }
    .lb-counter {
      position: absolute;
      bottom: -36px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 13px;
      color: rgba(255,255,255,.5);
    }

    /* Detail layout */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 40px;
      align-items: start;
    }
    .detail-main { min-width: 0; }
    .detail-header {
      margin-bottom: 28px;
    }
    .detail-type-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .detail-type-tag {
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      border-radius: var(--r-full);
      background: var(--forest-light);
      color: var(--forest);
    }
    .detail-avail {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: var(--r-full);
    }
    .avail-yes { background: #dcfce7; color: #166534; }
    .avail-no  { background: #fee2e2; color: #991b1b; }
    .avail-dot { width: 7px; height: 7px; border-radius: 50%; }
    .avail-yes .avail-dot { background: #22c55e; }
    .avail-no  .avail-dot { background: #ef4444; }

    .detail-title {
      font-family: var(--font-display);
      font-size: clamp(22px, 3vw, 32px);
      font-weight: 500;
      color: var(--text-1);
      line-height: 1.2;
      margin-bottom: 10px;
    }
    .detail-address {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-3);
      font-size: 14px;
    }
    .detail-address i { color: var(--terracotta); }

    /* Specs row */
    .specs-row {
      display: flex;
      gap: 0;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
      margin: 24px 0;
    }
    .spec-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 12px;
      gap: 6px;
      border-right: 1px solid var(--border);
    }
    .spec-item:last-child { border-right: none; }
    .spec-icon { font-size: 18px; color: var(--forest); }
    .spec-val { font-size: 15px; font-weight: 700; color: var(--text-1); }
    .spec-lbl { font-size: 11px; color: var(--text-3); text-align: center; }

    /* Section blocks */
    .detail-block {
      margin-bottom: 36px;
    }
    .detail-block-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .description-text {
      font-size: 15px;
      color: var(--text-2);
      line-height: 1.75;
    }

    /* Features grid */
    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: var(--r-sm);
      font-size: 13px;
      font-weight: 500;
    }
    .feature-item.yes {
      background: var(--forest-light);
      color: var(--forest);
    }
    .feature-item.no {
      background: var(--cream);
      color: var(--text-3);
      text-decoration: line-through;
      text-decoration-color: var(--border);
    }
    .feature-item i { width: 16px; text-align: center; }

    /* Travel times */
    .travel-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .travel-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
    }
    .travel-icon {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--white);
      display: grid;
      place-items: center;
      font-size: 17px;
      color: var(--forest);
      flex-shrink: 0;
      box-shadow: var(--shadow-xs);
    }
    .travel-info { display: flex; flex-direction: column; gap: 2px; }
    .travel-time { font-size: 17px; font-weight: 700; color: var(--text-1); }
    .travel-mode { font-size: 12px; color: var(--text-3); }

    /* Nearby places */
    .nearby-category { margin-bottom: 20px; }
    .nearby-cat-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-3);
      margin-bottom: 10px;
    }
    .nearby-cat-title i { color: var(--terracotta); }
    .nearby-items { display: flex; flex-direction: column; gap: 8px; }
    .nearby-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--cream);
      border-radius: var(--r-sm);
      font-size: 13px;
    }
    .nearby-name { font-weight: 500; color: var(--text-1); }
    .nearby-dist-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .nearby-dist {
      font-weight: 600;
      color: var(--forest);
      font-size: 12px;
    }
    .nearby-walk {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: var(--text-3);
    }

    /* Sidebar card */
    .detail-sidebar {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
    }
    .sidebar-card {
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--shadow-md);
    }
    .sidebar-price-block {
      padding: 28px 28px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-price {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 4px;
    }
    .sidebar-price .price-val {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 700;
      color: var(--forest);
      letter-spacing: -1px;
    }
    .sidebar-price .price-per { font-size: 14px; color: var(--text-3); }
    .sidebar-tagline { font-size: 13px; color: var(--text-3); }

    .sidebar-body { padding: 20px 28px; }
    .sidebar-landlord {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: var(--cream);
      border-radius: var(--r-md);
      margin-bottom: 20px;
    }
    .landlord-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--white);
      box-shadow: var(--shadow-xs);
    }
    .landlord-name { font-size: 15px; font-weight: 700; color: var(--text-1); margin-bottom: 2px; }
    .landlord-type { font-size: 12px; color: var(--text-3); }
    .landlord-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      margin-top: 4px;
    }
    .landlord-rating i { color: #f59e0b; }

    .sidebar-phone {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--cream);
      border-radius: var(--r-md);
      margin-bottom: 16px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: border-color .2s, background .2s;
      text-decoration: none;
    }
    .sidebar-phone:hover { border-color: var(--forest); background: var(--forest-light); }
    .phone-icon {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--forest);
      color: var(--white);
      display: grid;
      place-items: center;
      font-size: 15px;
      flex-shrink: 0;
    }
    .phone-label { font-size: 11px; color: var(--text-3); }
    .phone-number { font-size: 15px; font-weight: 700; color: var(--text-1); }

    .btn-contact {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 16px;
      font-size: 15px;
      font-weight: 700;
      color: var(--white);
      background: var(--terracotta);
      border: none;
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background .2s, transform .15s var(--ease-spring);
      margin-bottom: 10px;
    }
    .btn-contact:hover { background: #bf5430; transform: translateY(-2px); }
    .btn-schedule {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px;
      font-size: 14px;
      font-weight: 600;
      color: var(--forest);
      background: var(--forest-light);
      border: 1.5px solid var(--forest);
      border-radius: var(--r-md);
      cursor: pointer;
      transition: background .2s, transform .15s var(--ease-spring);
    }
    .btn-schedule:hover { background: var(--forest); color: var(--white); }
    .sidebar-note {
      text-align: center;
      font-size: 12px;
      color: var(--text-3);
      margin-top: 14px;
    }

    /* Skeleton */
    .skeleton {
      animation: shimmer 1.5s infinite;
      background: linear-gradient(90deg, var(--cream-dark) 25%, var(--cream) 50%, var(--cream-dark) 75%);
      background-size: 200% 100%;
      border-radius: var(--r-sm);
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 900px) {
      .detail-layout { grid-template-columns: 1fr; }
      .detail-sidebar { position: static; }
      .gallery {
        grid-template-columns: 1fr;
        grid-template-rows: 260px;
        max-height: 260px;
      }
      .gallery-main { grid-row: auto; }
      .gallery-thumb { display: none; }
      .features-grid { grid-template-columns: repeat(2, 1fr); }
      .travel-grid { grid-template-columns: 1fr; }
      .lb-prev { left: -44px; }
      .lb-next { right: -44px; }
    }
    @media (max-width: 600px) {
      .features-grid { grid-template-columns: 1fr 1fr; }
      .specs-row { flex-wrap: wrap; }
      .spec-item { flex: 0 0 50%; border-bottom: 1px solid var(--border); }
      .lb-prev, .lb-next { display: none; }
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <div class="logo-mark">E</div>
        <span class="logo-text">Estudante<strong>Lar</strong></span>
      </a>
      <div class="nav-links" id="navLinks">
        <a href="index.html#properties" class="nav-link">Alugar</a>
        <a href="criar-anuncio.html" class="nav-link">Anunciar</a>
        <a href="roommates.html" class="nav-link">Roommates</a>
        <a href="mensagens.html" class="nav-link">Mensagens</a>
      </div>
      <div class="nav-actions">
        <a href="favoritos.html" class="btn-ghost">❤ Favoritos</a>
        <a href="login.html" class="btn-ghost">Entrar</a>
        <a href="cadastro.html" class="btn-primary-sm">Cadastrar</a>
      </div>
      <button class="nav-mobile-toggle" id="mobileToggle" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Main content -->
  <main style="padding-top: var(--nav-h); padding-bottom: 80px;">
    <div class="container" style="padding-top: 40px;">

      <a href="index.html" class="detail-back">
        <i class="fa-solid fa-arrow-left"></i> Voltar para listagem
      </a>

      <!-- Gallery -->
      <div class="gallery" id="gallery">
        <!-- Preenchido pelo JS -->
      </div>

      <!-- Layout -->
      <div class="detail-layout">

        <!-- Main info -->
        <div class="detail-main" id="detailMain">
          <!-- Preenchido pelo JS -->
        </div>

        <!-- Sidebar -->
        <aside class="detail-sidebar">
          <div class="sidebar-card" id="sidebarCard">
            <!-- Preenchido pelo JS -->
          </div>
        </aside>

      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-label="Galeria de fotos">
    <div class="lightbox-img-wrap">
      <button class="lb-close" id="lbClose" aria-label="Fechar"><i class="fa-solid fa-xmark"></i></button>
      <img id="lbImg" src="" alt="Foto do imóvel">
      <button class="lb-btn lb-prev" id="lbPrev" aria-label="Anterior"><i class="fa-solid fa-chevron-left"></i></button>
      <button class="lb-btn lb-next" id="lbNext" aria-label="Próxima"><i class="fa-solid fa-chevron-right"></i></button>
      <span class="lb-counter" id="lbCounter"></span>
    </div>
  </div>

  <script src="detail.js"></script>
</body>
</html>
